<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

    <!-- App Info -->
    <title>Rede Conect</title>
    <meta name="description" content="Plataforma de gestão eclesiástica para igrejas que crescem." />
    <meta name="author" content="Rede Conect" />
    <meta name="keywords" content="gestão eclesiástica, igreja, membros, escalas, ministério, comunidade" />

    <!-- Theme Color -->
    <meta name="theme-color" content="#020F1E" />
    <meta name="msapplication-TileColor" content="#020F1E" />

    <!-- iOS PWA Support -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Rede Conect" />
    <link rel="apple-touch-icon" href="/pwa-192x192.png" />

    <!-- Favicon neutro da plataforma — sobrescrito dinamicamente por /i/:slug/* via IgrejaSlugContext -->
    <link id="favicon-default" rel="icon" type="image/png" href="/pwa-192x192.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/pwa-192x192.png" />

    <!-- Open Graph -->
    <meta property="og:title" content="Rede Conect" />
    <meta property="og:description" content="Plataforma de gestão eclesiástica para igrejas que crescem." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/pwa-512x512.png" />
    <meta property="og:locale" content="pt_BR" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Rede Conect - Gestão Eclesiástica" />
    <meta name="twitter:description" content="Plataforma de gestão eclesiástica para igrejas que crescem." />
    <meta name="twitter:image" content="/pwa-512x512.png" />

    <!-- Preconnect for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
